name: Build, Notarize & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-latest
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release archive
        run: |
          xcodebuild -project Chops.xcodeproj \
            -scheme Chops \
            -configuration Release \
            -archivePath build/Chops.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="${DEVELOPER_ID_APPLICATION}" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}"

      - name: Export archive to .app
        run: |
          # Substitute team ID into ExportOptions.plist
          sed -i '' "s/\${APPLE_TEAM_ID}/${APPLE_TEAM_ID}/g" ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath build/Chops.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath build/export

      - name: Create .dmg
        run: |
          hdiutil create -volname "Chops" \
            -srcfolder build/export/Chops.app \
            -ov -format UDZO \
            build/Chops.dmg

      - name: Notarize .dmg
        run: |
          xcrun notarytool submit build/Chops.dmg \
            --apple-id "${APPLE_ID}" \
            --password "${APPLE_PASSWORD}" \
            --team-id "${APPLE_TEAM_ID}" \
            --wait

      - name: Staple notarization ticket to .app
        run: |
          xcrun stapler staple build/export/Chops.app

      - name: Re-create .dmg after stapling
        run: |
          rm build/Chops.dmg
          hdiutil create -volname "Chops" \
            -srcfolder build/export/Chops.app \
            -ov -format UDZO \
            build/Chops.dmg

      - name: Staple notarization ticket to .dmg
        run: |
          xcrun stapler staple build/Chops.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/Chops.dmg
          generate_release_notes: true

      - name: Generate Sparkle appcast
        run: |
          if command -v generate_appcast &> /dev/null; then
            generate_appcast build/
          else
            echo "generate_appcast not found, skipping appcast generation"
          fi
